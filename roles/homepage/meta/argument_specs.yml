---
argument_specs:
  main:
    short_description: Deploy Homepage using Podman quadlet
    description:
      - Deploys Homepage as a systemd-managed Podman quadlet container.
    options:
      # ---- Core ----
      homepage_version:
        type: str
        default: "latest"
        description: Homepage image tag/version.

      homepage_image:
        type: str
        default: "ghcr.io/gethomepage/homepage:{{ homepage_version }}"
        description: Container image reference.

      homepage_service:
        type: str
        default: "freshrss"
        description:
          - Podman container name and (by convention) the systemd unit name used by the handler.

      homepage_domain:
        type: str
        required: true
        description: Public DNS name for Homepage (used for BASE_URL and routing).

      homepage_url:
        type: str
        default: "https://{{ homepage_domain }}"
        description: Public URL for Homepage.

      # ---- Quadlet / systemd ----
      homepage_quadlet_wanted_by:
        type: str
        default: "multi-user.target"
        description: systemd target to install/enable the quadlet unit under.

      # ---- Volumes ----
      homepage_volume_dir:
        type: str
        default: "/srv/containers/{{ homepage_service }}"
        description: Location of the bind-mount for homepage configuration.

      # ---- UID/GID ----
      homepage_uid:
        type: int
        default: 1000
        description: UID used inside the container.

      homepage_gid:
        type: int
        default: 1000
        description: GID used inside the container.
        
      # --- Homepage Settings ---
      homepage_searchprovider:
        type: str
        default: "duckduckgo"
        choices: ["google", "duckduckgo", "bing", "baidu", "brave", "custom"]

      # ---- Extension hooks ----
      homepage_extra_env:
        type: dict
        default: {}
        description: Extra environment variables merged into the container environment.

      homepage_extra_labels:
        type: dict
        default: {}
        description: Extra labels merged into the container labels.

      homepage_extra_volumes:
        type: list
        default: []
        description: Extra volumes merged into the container volumes.

      homepage_extra_secrets:
        type: list
        default: []
        description: Extra secrets merged into the container secrets.

      homepage_extra_quadlet_options:
        type: list
        elements: str
        default: []
        description: Extra options merged into the container unit file.
