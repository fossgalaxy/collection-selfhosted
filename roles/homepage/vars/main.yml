---

homepage_env:
	PUID: "{{ homepage_uid }}",
      	PGID: "{{ homepage_gid }}",
      	HOMEPAGE_ALLOWED_HOSTS: "{{ homepage_domain }}"
  }

homepage_secrets: {}

homepage_volumes: >-
  {{
    [
      homepage_volume_dir ~ ':/app/config:Z'
    ]
  }}

homepage_labels: >-
  {{
    (homepage_traefik | bool)
    | ternary(homepage_traefik_labels, {})
  }}

homepage_quadlet_options:
  - |
    [Install]
    WantedBy={{ homepage_quadlet_wanted_by }}
